<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Live - Pro Max</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js for Live Streaming (High Compatibility) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #060911;
            color: #f1f5f9;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Standard Active Channel (Dark Mode) */
        #channelContainer .active-channel {
            border: 2px solid #ef4444 !important;
            background: linear-gradient(180deg, rgba(239, 68, 68, 0.25) 0%, rgba(15, 23, 42, 0.95) 100%) !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.35) !important;
        }

        /* Light Theme Overrides */
        body.light-theme {
            background-color: #f8fafc !important;
            color: #0f172a !important;
        }
        body.light-theme .glass-card {
            background: rgba(255, 255, 255, 0.95) !important;
            border-color: #cbd5e1 !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05) !important;
        }
        body.light-theme header, 
        body.light-theme #headerMenu {
            background-color: #ffffff !important;
            border-color: #cbd5e1 !important;
        }
        
        /* Header Menu Button Fix for Light Theme */
        body.light-theme header button {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
        }

        /* IPTV Logo Icon Fix for Light Theme */
        body.light-theme header .bg-gradient-to-tr {
            background: linear-gradient(135deg, #2563eb 0%, #38bdf8 100%) !important;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2) !important;
        }

        /* Channel Counter Badge Fix for Light Theme */
        body.light-theme #channelCounter {
            background-color: #eff6ff !important;
            color: #1d4ed8 !important;
            border-color: #bfdbfe !important;
        }

        body.light-theme #appTitle,
        body.light-theme #chListTitle,
        body.light-theme h3, 
        body.light-theme h4,
        body.light-theme .text-white, 
        body.light-theme .text-slate-100, 
        body.light-theme .text-slate-200, 
        body.light-theme .text-slate-300 {
            color: #0f172a !important;
        }
        body.light-theme #noticeText,
        body.light-theme .text-slate-400, 
        body.light-theme .text-slate-500 {
            color: #475569 !important;
        }
        body.light-theme input, 
        body.light-theme select {
            background-color: #ffffff !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
        }
        body.light-theme .menu-btn-item {
            background-color: #f1f5f9 !important;
            border-color: #e2e8f0 !important;
            color: #0f172a !important;
        }
        body.light-theme .menu-btn-item:hover {
            background-color: #e2e8f0 !important;
        }
        body.light-theme #channelContainer > div {
            background-color: #ffffff !important;
            border: 1px solid #e2e8f0 !important;
        }
        body.light-theme #channelContainer > div:hover {
            background-color: #f8fafc !important;
        }
        body.light-theme #channelContainer .bg-slate-950,
        body.light-theme #channelContainer .bg-slate-900 {
            background-color: #f1f5f9 !important;
            border-color: #cbd5e1 !important;
        }

        /* Fixed Player Loading Text & Background for Light Theme */
        body.light-theme #playerOverlay {
            background-color: #f8fafc !important;
        }
        body.light-theme #overlayTitle {
            color: #0f172a !important;
        }
        body.light-theme #overlayDesc {
            color: #475569 !important;
        }

        /* Fixed Active Channel specifically for Light Theme */
        body.light-theme #channelContainer .active-channel {
            border: 2px solid #ef4444 !important;
            background: #fef2f2 !important;
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3) !important;
        }

        body.light-theme ::-webkit-scrollbar-track { background: #f1f5f9; }
        body.light-theme ::-webkit-scrollbar-thumb { background: #cbd5e1; }
        body.light-theme ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pro-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: #ffffff !important;
        }

        /* Responsive Layout Rules */
        .app-main-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media screen and (orientation: landscape) and (max-height: 600px) {
            .app-main-grid {
                display: grid !important;
                grid-template-columns: 1.4fr 1fr !important;
                gap: 0.75rem !important;
            }
            .channel-card-box {
                max-height: calc(100vh - 100px) !important;
                min-height: auto !important;
            }
        }

        @media (min-width: 900px) {
            .app-main-grid {
                display: grid !important;
                grid-template-columns: 1.8fr 1.2fr !important;
                gap: 1rem !important;
            }
        }

        /* Grid View Styling */
        .grid-view {
            display: grid !important;
            grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
            gap: 0.6rem !important;
            align-content: start !important;
        }
        @media (min-width: 640px) {
            .grid-view {
                grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
            }
        }
        .grid-view > div {
            flex-direction: column !important;
            align-items: center !important;
            text-align: center !important;
            padding: 0.75rem 0.5rem !important;
            height: auto !important;
            min-height: 140px !important;
            justify-content: space-between !important;
        }
        .grid-view > div .flex-channel-info {
            flex-direction: column !important;
            align-items: center !important;
            width: 100%;
        }

        /* Menu Item Styling */
        .menu-btn-item {
            background-color: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .menu-btn-item:hover {
            background-color: rgba(51, 65, 85, 0.9);
            border-color: rgba(59, 130, 246, 0.4);
            transform: translateX(3px);
        }

        /* 3D Player Card */
        .player-3d-card {
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.8),
                        0 0 20px -5px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pure-red-badge {
            background-color: #ff0000 !important;
            color: #ffffff !important;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .live-active-badge {
            background-color: #ff0000 !important;
            color: #ffffff !important;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.6);
            border: none !important;
        }

        #mainVideo {
            width: 100% !important;
            height: 100% !important;
            object-fit: fill !important;
            background-color: #000;
        }

        #mainVideo.fit-contain {
            object-fit: contain !important;
        }
        #mainVideo.fit-fill {
            object-fit: fill !important;
        }

        video::-webkit-media-controls-start-playback-button {
            display: none !important;
        }

        #playerOverlay {
            background-color: #020617;
            z-index: 30 !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header / Navbar -->
    <header class="sticky top-0 z-50 glass-card border-b border-slate-800/80 px-3 py-2">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            
            <!-- Logo & Title -->
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-blue-700 to-cyan-500 flex items-center justify-center text-white shadow-lg shadow-blue-500/30 border border-blue-400/30 shrink-0">
                    <i class="fa-solid fa-circle-play text-base animate-pulse"></i>
                </div>
                <div>
                    <div class="flex items-center gap-1.5">
                        <h1 id="appTitle" class="text-xs font-bold tracking-wide text-white">আইপি টিভি লাইভ</h1>
                        <span class="pro-badge text-[8px] font-black px-1 py-0.5 rounded tracking-wider uppercase">PRO MAX</span>
                    </div>
                </div>
            </div>

            <!-- Header Menu Button -->
            <div class="relative">
                <button onclick="toggleMenu()" class="px-2.5 py-1 rounded-lg bg-slate-800 hover:bg-slate-700 active:scale-95 text-xs text-slate-200 border border-slate-700 transition flex items-center gap-1.5 shadow-sm">
                    <i class="fa-solid fa-bars text-blue-400"></i>
                    <span id="menuBtnText" class="hidden sm:inline">মেনু</span>
                </button>

                <!-- Dropdown Menu Box -->
                <div id="headerMenu" class="hidden absolute right-0 mt-2 w-56 rounded-xl bg-slate-900/95 border border-slate-800 shadow-2xl z-50 p-2 space-y-1 backdrop-blur-xl">
                    
                    <button onclick="showFavorites(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-star text-amber-400 text-xs w-4 text-center"></i>
                        <span id="mFavText" class="font-medium">ফেভারিট চ্যানেল</span>
                    </button>

                    <button onclick="showRecents(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-purple-400 text-xs w-4 text-center"></i>
                        <span id="mRecentText" class="font-medium">সাম্প্রতিক প্লে</span>
                    </button>

                    <hr class="border-slate-800 my-1">

                    <button onclick="fetchPlaylist(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-rotate-right text-blue-400 text-xs w-4 text-center"></i>
                        <span id="mRefreshText" class="font-medium">প্লে-লিস্ট রিফ্রেশ</span>
                    </button>

                    <button onclick="addCustomPlaylist(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-link text-indigo-400 text-xs w-4 text-center"></i>
                        <span id="mCustomText" class="font-medium">কাস্টম লিংক প্লে করুন</span>
                    </button>

                    <button onclick="toggleFullScreen('contain'); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-expand text-pink-400 text-xs w-4 text-center"></i>
                        <span id="mFsOriginalText" class="font-medium">ফুলস্ক্রিন (অরিজিনাল)</span>
                    </button>

                    <button onclick="toggleFullScreen('fill'); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-up-right-and-down-left-from-center text-rose-400 text-xs w-4 text-center"></i>
                        <span id="mFsFitText" class="font-medium">ফুলস্ক্রিন (ফুল ফিট)</span>
                    </button>

                    <button onclick="toggleLayout(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i id="layoutIcon" class="fa-solid fa-list text-teal-400 text-xs w-4 text-center"></i>
                        <span id="layoutText" class="font-medium">লিস্ট ভিউ চালু করুন</span>
                    </button>

                    <button onclick="toggleTheme(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i id="themeIcon" class="fa-solid fa-sun text-yellow-400 text-xs w-4 text-center"></i>
                        <span id="themeText" class="font-medium">লাইট থিম করুন</span>
                    </button>

                    <button onclick="toggleLanguage(); toggleMenu();" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-language text-emerald-400 text-xs w-4 text-center"></i>
                        <span id="langText" class="font-medium">English Language</span>
                    </button>

                    <hr class="border-slate-800 my-1">

                    <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank" onclick="toggleMenu()" class="menu-btn-item w-full text-left px-3 py-1.5 text-xs text-slate-200 rounded-lg flex items-center gap-2 block">
                        <i class="fa-brands fa-facebook text-blue-500 text-xs w-4 text-center"></i>
                        <span id="mSupportText" class="font-medium">সাপোর্ট (Facebook)</span>
                    </a>

                </div>
            </div>

        </div>
    </header>

    <!-- নোটিশ সেকশন -->
    <div class="max-w-7xl mx-auto w-full px-3 pt-2">
        <div class="glass-card rounded-xl px-2 py-0.5 border border-slate-800/80 shadow-md">
            <div class="flex items-center gap-2">
                <span class="pure-red-badge text-[9px] font-bold px-1.5 py-0.5 rounded shrink-0 flex items-center gap-1 uppercase tracking-wide">
                    <i class="fa-solid fa-bullhorn text-[8px]"></i> <span id="noticeBadge">নোটিশ</span>
                </span>
                <marquee id="noticeText" behavior="scroll" direction="left" class="text-[10px] text-slate-300 font-medium tracking-wide leading-tight">
                    স্বাগতম! কোনো চ্যানেল লোড না হলে প্লে-লিস্ট রিফ্রেশ করুন অথবা অন্য ক্যাটাগরি থেকে চ্যানেল প্লে করুন। নিরবচ্ছিন্ন লাইভ টিভি উপভোগ করুন।
                </marquee>
            </div>
        </div>
    </div>

    <!-- Layout Main Container -->
    <main class="max-w-7xl mx-auto w-full p-2.5 lg:p-4 flex-1 app-main-grid">

        <!-- Player Column -->
        <div class="w-full flex flex-col gap-2">
            <div id="playerContainer" class="player-3d-card relative w-full bg-black rounded-xl overflow-hidden aspect-video flex items-center justify-center group shadow-2xl">
                <video id="mainVideo" class="w-full h-full object-fill fit-fill" controls autoplay crossorigin="anonymous" referrerpolicy="no-referrer" playsinline></video>

                <!-- Player Loading & Notice Overlay -->
                <div id="playerOverlay" class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center z-10 transition-all duration-300">
                    <div id="overlayIconBox" class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20 flex items-center justify-center text-lg mb-2 shadow-inner">
                        <i id="overlayIcon" class="fa-solid fa-play"></i>
                    </div>
                    <h3 id="overlayTitle" class="text-xs font-semibold text-slate-200">চ্যানেল সিলেক্ট করুন</h3>
                    <p id="overlayDesc" class="text-[10px] text-slate-400 max-w-xs mt-1">তালিকা থেকে যেকোনো চ্যানেল নির্বাচন করে প্লে করুন।</p>
                </div>
            </div>
        </div>

        <!-- Channel List Column -->
        <div class="w-full glass-card rounded-xl p-2.5 flex flex-col channel-card-box shadow-xl min-h-[400px]">
            
            <div class="space-y-2 pb-2 border-b border-slate-800/80 shrink-0">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-1.5">
                        <i class="fa-solid fa-list-ul text-blue-400"></i>
                        <span id="chListTitle">চ্যানেল লিস্ট</span>
                    </span>
                    <span id="channelCounter" class="text-[10px] bg-blue-600 text-white font-bold border border-blue-500 px-2 py-0.5 rounded-full font-mono shadow-sm">0</span>
                </div>

                <div class="flex items-center gap-2">
                    <select id="categorySelect" onchange="onCategoryChange()" 
                        class="w-1/3 bg-slate-950/80 text-[10px] text-slate-200 rounded-lg px-2 py-1.5 border border-slate-800 focus:outline-none focus:border-blue-500 transition cursor-pointer">
                        <option value="ALL">সকল ক্যাটাগরি</option>
                    </select>

                    <div class="relative flex-1">
                        <input type="text" id="searchInput" oninput="filterChannels()" placeholder="খুঁজুন..." 
                            class="w-full bg-slate-950/80 text-[10px] text-slate-100 rounded-lg pl-7 pr-2 py-1.5 border border-slate-800 focus:outline-none focus:border-blue-500 transition">
                        <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-2 text-[9px] text-slate-500"></i>
                    </div>
                </div>
            </div>

            <!-- Scrollable Area -->
            <div id="channelContainer" class="flex-1 overflow-y-auto pt-2 space-y-1.5 pr-1 content-start max-h-[500px] grid-view">
                <p id="loadingText" class="text-center text-xs text-slate-500 py-6">প্লে-লিস্ট লোড হচ্ছে...</p>
            </div>

        </div>

    </main>

    <script>
        const currentPlaylistUrl = "https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Combined_Live_TV.m3u";

        const PROXIES = [
            (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];

        let allChannels = [];
        let currentlyDisplayedChannels = []; 
        let favorites = JSON.parse(localStorage.getItem('iptv_fav_urls')) || [];
        let recents = JSON.parse(localStorage.getItem('iptv_recent_urls')) || [];
        let hlsInstance = null;
        let activeUrl = "";
        let isGridView = true; 
        let isLightTheme = false;
        let currentLang = 'bn'; 

        const video = document.getElementById('mainVideo');
        const overlay = document.getElementById('playerOverlay');
        const overlayIconBox = document.getElementById('overlayIconBox');
        const overlayIcon = document.getElementById('overlayIcon');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayDesc = document.getElementById('overlayDesc');
        const channelContainer = document.getElementById('channelContainer');
        const channelCounter = document.getElementById('channelCounter');
        const categorySelect = document.getElementById('categorySelect');
        const headerMenu = document.getElementById('headerMenu');

        window.addEventListener('DOMContentLoaded', () => {
            setupVideoListeners();
            fetchPlaylist();
        });

        function setupVideoListeners() {
            video.addEventListener('playing', () => {
                hideLoadingOverlay();
            });

            video.addEventListener('waiting', () => {
                const title = currentLang === 'bn' ? "বাফারিং হচ্ছে..." : "Buffering...";
                const desc = currentLang === 'bn' ? "দয়া করে অপেক্ষা করুন, স্ট্রিম লোড হচ্ছে।" : "Please wait, stream is buffering.";
                showLoadingState(title, desc);
            });
        }

        function showLoadingState(title, desc) {
            overlayIcon.className = "fa-solid fa-spinner fa-spin text-lg text-blue-400";
            overlayTitle.textContent = title;
            overlayDesc.textContent = desc;
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        }

        function hideLoadingOverlay() {
            overlay.classList.add('opacity-0', 'pointer-events-none');
        }

        function toggleMenu() {
            headerMenu.classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.relative')) {
                headerMenu.classList.add('hidden');
            }
        });

        function toggleTheme() {
            isLightTheme = !isLightTheme;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');

            if (isLightTheme) {
                document.body.classList.add('light-theme');
                themeIcon.className = "fa-solid fa-moon text-blue-600 text-xs w-4 text-center";
                themeText.textContent = currentLang === 'bn' ? "ডার্ক থিম করুন" : "Dark Theme";
            } else {
                document.body.classList.remove('light-theme');
                themeIcon.className = "fa-solid fa-sun text-yellow-400 text-xs w-4 text-center";
                themeText.textContent = currentLang === 'bn' ? "লাইট থিম করুন" : "Light Theme";
            }
            renderChannels(currentlyDisplayedChannels);
        }

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';

            if (currentLang === 'en') {
                document.getElementById('appTitle').textContent = "IPTV Live";
                document.getElementById('menuBtnText').textContent = "Menu";
                document.getElementById('mFavText').textContent = "Favorite Channels";
                document.getElementById('mRecentText').textContent = "Recently Played";
                document.getElementById('mRefreshText').textContent = "Refresh Playlist";
                document.getElementById('mCustomText').textContent = "Play Custom Stream";
                document.getElementById('mFsOriginalText').textContent = "Fullscreen (Original)";
                document.getElementById('mFsFitText').textContent = "Fullscreen (Full Fit)";
                document.getElementById('mSupportText').textContent = "Support (Facebook)";
                document.getElementById('chListTitle').textContent = "Channel List";
                document.getElementById('searchInput').placeholder = "Search...";
                document.getElementById('langText').textContent = "বাংলা ভাষা";
                document.getElementById('themeText').textContent = isLightTheme ? "Dark Theme" : "Light Theme";
                document.getElementById('layoutText').textContent = isGridView ? "List View" : "Grid View";
                document.getElementById('noticeBadge').textContent = "NOTICE";
                document.getElementById('noticeText').textContent = "Welcome! If a channel does not load, please refresh the playlist or select another channel. Enjoy smooth live streaming.";
            } else {
                document.getElementById('appTitle').textContent = "আইপি টিভি লাইভ";
                document.getElementById('menuBtnText').textContent = "মেনু";
                document.getElementById('mFavText').textContent = "ফেভারিট চ্যানেল";
                document.getElementById('mRecentText').textContent = "সাম্প্রতিক প্লে";
                document.getElementById('mRefreshText').textContent = "প্লে-লিস্ট রিফ্রেশ";
                document.getElementById('mCustomText').textContent = "কাস্টম লিংক প্লে করুন";
                document.getElementById('mFsOriginalText').textContent = "ফুলস্ক্রিন (অরিজিনাল)";
                document.getElementById('mFsFitText').textContent = "ফুলস্ক্রিন (ফুল ফিট)";
                document.getElementById('mSupportText').textContent = "সাপোর্ট (Facebook)";
                document.getElementById('chListTitle').textContent = "চ্যানেল লিস্ট";
                document.getElementById('searchInput').placeholder = "খুঁজুন...";
                document.getElementById('langText').textContent = "English Language";
                document.getElementById('themeText').textContent = isLightTheme ? "ডার্ক থিম করুন" : "লাইট থিম করুন";
                document.getElementById('layoutText').textContent = isGridView ? "লিস্ট ভিউ চালু করুন" : "গ্রিড ভিউ চালু করুন";
                document.getElementById('noticeBadge').textContent = "নোটিশ";
                document.getElementById('noticeText').textContent = "স্বাগতম! কোনো চ্যানেল লোড না হলে প্লে-লিস্ট রিফ্রেশ করুন অথবা অন্য ক্যাটাগরি থেকে চ্যানেল প্লে করুন। নিরবচ্ছিন্ন লাইভ টিভি উপভোগ করুন।";
            }

            populateCategories(allChannels);
        }

        function toggleLayout() {
            isGridView = !isGridView;
            const layoutIcon = document.getElementById('layoutIcon');
            const layoutText = document.getElementById('layoutText');

            if (isGridView) {
                channelContainer.classList.add('grid-view');
                layoutIcon.className = "fa-solid fa-list text-teal-400 text-xs w-4 text-center";
                layoutText.textContent = currentLang === 'bn' ? "লিস্ট ভিউ চালু করুন" : "List View";
            } else {
                channelContainer.classList.remove('grid-view');
                layoutIcon.className = "fa-solid fa-border-all text-teal-400 text-xs w-4 text-center";
                layoutText.textContent = currentLang === 'bn' ? "গ্রিড ভিউ চালু করুন" : "Grid View";
            }
        }

        function toggleFullScreen(mode = 'fill') {
            const playerElem = document.getElementById('playerContainer');
            
            if (mode === 'contain') {
                video.classList.remove('fit-fill');
                video.classList.add('fit-contain');
            } else {
                video.classList.remove('fit-contain');
                video.classList.add('fit-fill');
            }

            if (!document.fullscreenElement) {
                if (playerElem.requestFullscreen) {
                    playerElem.requestFullscreen();
                } else if (playerElem.webkitRequestFullscreen) {
                    playerElem.webkitRequestFullscreen();
                } else if (playerElem.msRequestFullscreen) {
                    playerElem.msRequestFullscreen();
                }
            }
        }

        function shareChannel(url, event) {
            if (event) event.stopPropagation();
            if (navigator.share) {
                navigator.share({
                    title: 'IPTV Live',
                    text: 'Watch live TV stream!',
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard.writeText(url);
                alert(currentLang === 'bn' ? "চ্যানেল স্ট্রিম লিঙ্ক কপি করা হয়েছে!" : "Channel stream URL copied!");
            }
        }

        function addCustomPlaylist() {
            const promptMsg = currentLang === 'bn' ? "আপনার M3U8 বা প্লে-লিস্টের সরাসরি URL লিংকটি দিন:" : "Enter your direct M3U8 or stream URL:";
            const customUrl = prompt(promptMsg);
            if (customUrl && customUrl.trim() !== "") {
                const customChannel = {
                    name: currentLang === 'bn' ? "কাস্টম স্ট্রিম" : "Custom Stream",
                    group: "Custom",
                    logo: "",
                    url: customUrl.trim()
                };
                allChannels.unshift(customChannel);
                populateCategories(allChannels);
                renderChannels(allChannels);
                playChannel(customChannel.url);
            }
        }

        async function fetchPlaylist() {
            channelContainer.innerHTML = `
                <div class="text-center py-6 text-slate-500 text-xs col-span-full">
                    <i class="fa-solid fa-spinner fa-spin text-lg mb-2 text-blue-500"></i>
                    <p>${currentLang === 'bn' ? 'প্লে-লিস্ট লোড হচ্ছে...' : 'Loading Playlist...'}</p>
                </div>
            `;

            try {
                const res = await fetch(currentPlaylistUrl, { cache: "no-store" });
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const text = await res.text();

                allChannels = parseM3U(text);

                if (allChannels.length > 0) {
                    populateCategories(allChannels);
                    renderChannels(allChannels);
                    playChannel(allChannels[0].url);
                } else {
                    showError(
                        currentLang === 'bn' ? "প্লে-লিস্ট খালি" : "Playlist Empty", 
                        currentLang === 'bn' ? "কোনো চ্যানেল পাওয়া যায়নি।" : "No channels found."
                    );
                }
            } catch (err) {
                console.error(err);
                channelContainer.innerHTML = `
                    <div class="text-center py-6 text-rose-400 text-xs col-span-full">
                        <i class="fa-solid fa-circle-exclamation text-xl mb-1.5"></i>
                        <p class="font-semibold">${currentLang === 'bn' ? 'প্লে-লিস্ট লোড হতে সমস্যা হয়েছে' : 'Failed to load playlist'}</p>
                        <p class="text-[10px] text-slate-500 mt-1">${err.message}</p>
                    </div>
                `;
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let item = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    item = {};
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    item.logo = logoMatch ? logoMatch[1] : '';

                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    item.group = groupMatch ? groupMatch[1] : 'Uncategorized';

                    const commaIdx = line.lastIndexOf(',');
                    item.name = commaIdx !== -1 ? line.substring(commaIdx + 1).trim() : 'Live Channel';
                } else if (line.length > 0 && !line.startsWith('#')) {
                    item.url = line;
                    channels.push(item);
                    item = {};
                }
            }
            return channels;
        }

        function populateCategories(channels) {
            const groups = [...new Set(channels.map(c => c.group).filter(Boolean))];
            
            const allText = currentLang === 'bn' ? "সকল ক্যাটাগরি" : "All Categories";
            categorySelect.innerHTML = `<option value="ALL">${allText}</option>`;
            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                categorySelect.appendChild(option);
            });
        }

        function toggleFavorite(url, event) {
            if (event) event.stopPropagation();

            if (favorites.includes(url)) {
                favorites = favorites.filter(favUrl => favUrl !== url);
            } else {
                favorites.push(url);
            }
            localStorage.setItem('iptv_fav_urls', JSON.stringify(favorites));

            renderChannels(currentlyDisplayedChannels);
        }

        function showFavorites() {
            categorySelect.value = "ALL";
            document.getElementById('searchInput').value = "";
            const favChannels = allChannels.filter(c => favorites.includes(c.url));
            renderChannels(favChannels);
        }

        function showRecents() {
            categorySelect.value = "ALL";
            document.getElementById('searchInput').value = "";
            const recentChannels = recents.map(url => allChannels.find(c => c.url === url)).filter(Boolean);
            renderChannels(recentChannels);
        }

        function renderChannels(list) {
            currentlyDisplayedChannels = list;
            channelCounter.textContent = list.length;

            if (list.length === 0) {
                const noChMsg = currentLang === 'bn' ? "কোনো চ্যানেল পাওয়া যায়নি" : "No channels found";
                channelContainer.innerHTML = `<p class="text-center text-slate-500 text-xs py-6 col-span-full">${noChMsg}</p>`;
                return;
            }

            channelContainer.innerHTML = list.map((ch) => {
                const isFav = favorites.includes(ch.url);
                const isActive = activeUrl === ch.url;
                const encodedUrl = encodeURIComponent(ch.url);
                
                return `
                <div onclick="playChannel(decodeURIComponent('${encodedUrl}'))" 
                    class="p-2 rounded-lg border border-slate-800/80 cursor-pointer hover:bg-slate-800/60 transition flex items-center justify-between gap-1.5 ${isActive ? 'active-channel' : ''}">
                    <div class="flex items-center gap-2 overflow-hidden flex-1 flex-channel-info">
                        <div class="w-10 h-10 rounded-md bg-slate-900 border border-slate-800 flex items-center justify-center shrink-0 overflow-hidden p-0.5 relative">
                            ${ch.logo 
                                ? `<img src="${ch.logo}" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');"><i class="fa-solid fa-tv text-xs text-blue-400 opacity-80 hidden"></i>` 
                                : `<i class="fa-solid fa-tv text-xs text-blue-400 opacity-80"></i>`
                            }
                        </div>
                        <div class="overflow-hidden w-full">
                            <h4 class="text-[11px] font-bold text-slate-100 truncate leading-tight">${ch.name}</h4>
                            <p class="text-[8px] text-slate-400 truncate mt-0.5">${ch.group}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0 mt-1">
                        <button onclick="shareChannel(decodeURIComponent('${encodedUrl}'), event)" class="p-0.5 hover:scale-125 transition text-xs text-slate-500 hover:text-blue-400" title="Share Channel">
                            <i class="fa-solid fa-share-nodes"></i>
                        </button>
                        <button onclick="toggleFavorite(decodeURIComponent('${encodedUrl}'), event)" class="p-0.5 hover:scale-125 transition text-xs">
                            <i class="${isFav ? 'fa-solid text-amber-400' : 'fa-regular text-slate-500'} fa-star"></i>
                        </button>
                        ${isActive ? `<span class="live-active-badge text-[8px] px-1.5 py-0.5 rounded font-mono uppercase">LIVE</span>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        function onCategoryChange() {
            document.getElementById('searchInput').value = ""; 
            filterChannels();
        }

        function filterChannels() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const selectedCategory = categorySelect.value;

            if (query.length > 0) {
                categorySelect.value = "ALL";
                const filtered = allChannels.filter(c => {
                    const channelName = (c.name || '').toLowerCase();
                    const channelGroup = (c.group || '').toLowerCase();
                    return channelName.includes(query) || channelGroup.includes(query);
                });
                renderChannels(filtered);
            } else {
                const filtered = (selectedCategory === 'ALL') 
                    ? allChannels 
                    : allChannels.filter(c => c.group === selectedCategory);
                renderChannels(filtered);
            }
        }

        function playChannel(url, proxyIndex = -1) {
            const ch = allChannels.find(c => c.url === url);
            if (!ch || !ch.url) return;

            activeUrl = url;

            recents = [url, ...recents.filter(rUrl => rUrl !== url)].slice(0, 15);
            localStorage.setItem('iptv_recent_urls', JSON.stringify(recents));

            renderChannels(currentlyDisplayedChannels);

            const loadTitle = currentLang === 'bn' ? `${ch.name} লোড হচ্ছে...` : `Loading ${ch.name}...`;
            const loadDesc = currentLang === 'bn' ? "দয়া করে অপেক্ষা করুন, স্ট্রিম কানেক্ট করা হচ্ছে।" : "Please wait, connecting stream.";
            showLoadingState(loadTitle, loadDesc);

            let targetStreamUrl = url;
            if (proxyIndex >= 0 && proxyIndex < PROXIES.length) {
                targetStreamUrl = PROXIES[proxyIndex](url);
            }

            if (hlsInstance) {
                hlsInstance.destroy();
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
                hlsInstance.loadSource(targetStreamUrl);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log("Autoplay blocked:", e));
                });

                hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (proxyIndex + 1 < PROXIES.length) {
                            console.warn("Direct stream failed/blocked. Switching to Proxy:", proxyIndex + 1);
                            playChannel(url, proxyIndex + 1);
                        } else {
                            showError(
                                currentLang === 'bn' ? "স্ট্রিম প্লে হতে সমস্যা হচ্ছে" : "Streaming Error", 
                                currentLang === 'bn' ? "চ্যানেল লিংকটি অফলাইন অথবা সিকিউরিটি দ্বারা ব্লক করা।" : "Stream link offline or blocked."
                            );
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = targetStreamUrl;
                video.play();
            }
        }

        function showError(title, desc) {
            overlayIcon.className = "fa-solid fa-circle-exclamation text-lg text-rose-500";
            overlayTitle.textContent = title;
            overlayDesc.textContent = desc;
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        }
    </script>
</body>
</html>
